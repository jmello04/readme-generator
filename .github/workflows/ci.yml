name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Qualidade de Código ────────────────────────────────────────────
  lint:
    name: Qualidade de Código (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar Ruff
        run: pip install ruff

      - name: Verificar estilo e lint
        run: ruff check .

  # ── Job 2: Testes Automatizados ───────────────────────────────────────────
  tests:
    name: Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar testes com cobertura
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml
        env:
          ANTHROPIC_API_KEY: test-key-para-ci

      - name: Enviar cobertura para Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Job 3: Build da Imagem Docker ─────────────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t readme-generator:ci .
